name: Forge Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show repo contents (debug)
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== src ==="
          ls -la src || true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unpack Forge MDK (handle nested folder)
        run: |
          set -e
          shopt -s nullglob
          files=( *.zip )
          if (( ${#files[@]} )); then
            echo "Found zip: ${files[0]}"
            unzip -o "${files[0]}" -d mdk_unpacked
            echo "Unpacked to mdk_unpacked/"
          else
            echo "No zip file found in repo root; assuming files already present."
          fi

          # Try to locate the MDK directory that contains build.gradle
          MDKDIR=""
          if [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            MDKDIR="."
            echo "build.gradle already in repo root"
          else
            MDKDIR=$(find mdk_unpacked -maxdepth 3 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec dirname {} \; | head -n 1 || true)
            if [ -n "$MDKDIR" ]; then
              echo "Found MDK build files in: $MDKDIR"
            else
              echo "No MDK build.gradle found in unpacked zip."
            fi
          fi

          # Copy necessary build files to repo root WITHOUT overwriting existing files (preserve your src)
          if [ -n "$MDKDIR" ] && [ "$MDKDIR" != "." ]; then
            cp -rn "$MDKDIR"/gradle . || true
            cp -rn "$MDKDIR"/gradlew . || true
            cp -rn "$MDKDIR"/build.gradle* . || true
            cp -rn "$MDKDIR"/settings.gradle* . || true
            cp -rn "$MDKDIR"/*.properties . || true
            echo "Copied gradle wrapper and build files (without overwriting existing files)."
          fi

          # Make gradlew executable if present
          if [ -f gradlew ]; then
            chmod +x gradlew
            echo "Made gradlew executable"
          else
            echo "gradlew not found in repo root; attempting to use gradle if available"
          fi

          echo "=== After setup ls -la ==="
          ls -la

      - name: Build Mod
        run: |
          set -e
          echo "Running build..."
          if [ -x ./gradlew ]; then
            ./gradlew --no-daemon build
          else
            if command -v gradle >/dev/null 2>&1; then
              gradle build
            else
              echo "ERROR: No gradlew and no system gradle found; cannot build."
              exit 1
            fi
          fi

      - name: Show build output (debug)
        run: |
          echo "=== build/libs ==="
          ls -la build/libs || true
          echo "=== find jars ==="
          find . -type f -name "*.jar" -print || true

      - name: Upload JAR
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: AbsoluteTerror-Release
          path: build/libs/*.jar
