name: Forge Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup MDK
        run: |
          # find the first Forge MDK zip in the repo root and unzip it (robust to missing / multiple files)
          shopt -s nullglob
          files=( *.zip )
          if (( ${#files[@]} )); then
            unzip -o "${files[0]}"
          else
            echo "No MDK zip found in repository root; proceeding (if files already present, build will continue)."
          fi
          chmod +x gradlew

      - name: Build Mod
        run: ./gradlew --no-daemon build

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: AbsoluteTerror-Release
          path: build/libs/*.jar
